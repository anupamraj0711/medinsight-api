<!DOCTYPE html>
<html>
<body>

<h2>Admin Panel</h2>
<button onclick="load()">Load Users</button>

<pre id="out"></pre>

<script>
async function load(){
  const res = await fetch("http://localhost:5000/admin/users");
  const data = await res.json();
  out.innerText = JSON.stringify(data,null,2);
}
</script>

</body>
</html>
