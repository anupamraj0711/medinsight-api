<!DOCTYPE html>
<html>
<head>
  <title>Doctor Portal</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      width: 380px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .avatar {
      width: 70px;
      height: 70px;
      background: #ccc;
      border-radius: 50%;
      margin: auto;
    }

    h2 {
      margin-top: 15px;
    }

    p {
      color: gray;
      font-size: 14px;
    }

    .input-box {
      display: flex;
      align-items: center;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      margin: 10px 0;
      background: #fafafa;
    }

    .input-box input {
      border: none;
      outline: none;
      width: 100%;
      padding: 8px;
      background: transparent;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      margin-top: 15px;
      cursor: pointer;
      font-size: 16px;
    }

    .divider {
      margin: 20px 0;
      border-top: 1px solid #ddd;
    }

    .footer {
      font-size: 13px;
      color: gray;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="avatar"></div>

  <h2>Doctor Portal</h2>
  <p>Secure access for healthcare providers</p>

  <div class="input-box">
    📧
    <input id="email" placeholder="doctor@hospital.com">
  </div>

  <div class="input-box">
    🔒
    <input id="password" type="password" placeholder="********">
  </div>

  <button class="btn" onclick="login()">Sign In</button>

  <p>Forgot password?</p>

  <div class="divider"></div>

  <div class="footer">
    🔒 Secure HIPAA-compliant login
  </div>

</div>

<script>
        const API = "https://medinsight-api-xwxa.onrender.com";
async function login() {
  const res = await fetch(`${API}/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();

  /*
  if (data.token) {
    localStorage.setItem("token", data.token);
    window.location.href = "doctor-dashboard.html";
  } else {
    alert("Login failed");
  }
}
  */

  if (data.token) {
    localStorage.setItem("token", data.token);

    if (data.role === "doctor") {
      window.location.href = "doctor-dashboard.html";
    } else {
      window.location.href = "dashboard.html";
    }

  } else {
    alert("Login failed");
  }
}
</script>

</body>
</html>
